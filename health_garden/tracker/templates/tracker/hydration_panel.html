{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Hydration</title>
    <style>
        @font-face {
            font-family: 'MyLocalFont';
            src: url("{% static 'tracker/fonts/Montserrat-Regular.woff2' %}") format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'MyLocalFont';
            src: url("{% static 'tracker/fonts/Montserrat-Bold.woff2' %}") format('woff2');
            font-weight: bold;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', 'Segoe UI', sans-serif;
            background: linear-gradient(0deg, #c1e0dc 0%, #ffffff 100%);
            color: #2c3e3e;
            padding: 2rem;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #container {
            display: flex;
            flex: 1;
            min-height: 0;
            gap: 2rem;
            width: 100%;
            margin: 0 auto;
            align-items: stretch;
        }

        #left-panel {
            display: flex;
            flex-direction: column;
            flex: 2;
            min-height: 0;
            overflow: hidden;
            background: #f7fcfb;
            border-radius: 14px;
            padding: 2rem;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            border: 1px solid #c5dfd9;
        }

        #right-panel {
            flex: 5;
            background: #f7fcfb;
            border-radius: 14px;
            padding: 2rem;
            min-height: 0;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            border: 1px solid #c5dfd9;
        }

        h1 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            color: #2f6b6b;
            border-bottom: 2px solid #b2d8d5;
            padding-bottom: 0.5rem;
            text-transform: uppercase;
        }

        hr {
            border: none;
            border-top: 2px solid #b2d8d5;
        }


        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #3e6b6b;
        }
        input[type="text"],
        input[type="number"],
        input[type="date"] {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #b2d8d5;
            border-radius: 8px;
            font-size: 1rem;
            background: #ffffff;
            color: #2c3e3e;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #5b9a9a;
            box-shadow: 0 0 0 3px rgba(91,154,154,0.2);
        }

        button {
            background: #4a8c8c;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            font-weight: 600;
        }
        button:hover {
            background: #3a7070;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background: #a8d0d0;
            cursor: not-allowed;
            transform: none;
        }

        #submit-btn {
            width: 100%;
            margin-bottom: 1.2rem;
        }

        .stats {
            font-size: 1rem;
            font-weight: bold;
            color: #3e6b6b;
        }
        .stats strong {
            color: #2f6b6b;
            font-size: 3rem;
            font-weight: bold;
        }

        #waterTableWrapper {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            width: 100%;
            padding: 0;
        }
        #waterTableScrollable {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        th, td {
            line-height: 1;
            height: 3rem;
            padding: 0 0.8rem;
            text-align: left;
            vertical-align: middle;
            white-space: nowrap;
            overflow: hidden;
            font-size: 1rem;
        }
        th {
            background: #d4ece9;
            font-weight: 600;
            color: #2c3e3e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 10;
        }
        tr {
            border-bottom: 1px solid #d4ece9;
        }
        tr:hover {
            background: #ecf8f6;
        }
        #waterTableWrapper > table:first-child th:nth-child(1) { width: 40%; }
        #waterTableWrapper > table:first-child th:nth-child(2) { width: 40%; }
        #waterTableWrapper > table:first-child th:nth-child(3) { width: 20%; }

        /* Body table columns – make sure they match */
        #waterTableScrollable table td:nth-child(1) { width: 40%; }
        #waterTableScrollable table td:nth-child(2) { width: 40%; }
        #waterTableScrollable table td:nth-child(3) { width: 20%; }

        .delBtn {
            padding: 0 0.8rem 0 0.8rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: None;
            color: #d98181;
            border: none;
            aspect-ratio: 1/1;
            font-size: 1.6rem;
            
            cursor: pointer;
            transition: background 0.2s;
        }
        .delBtn:hover {
            background: None; 
            color: #b97263;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div id="container">
    <!-- ========= LEFT PANEL ========= -->
    <div id="left-panel">
        <h1>Daily Hydration</h1>

        <form method="post" novalidate id="foodInput">
            {% csrf_token %}

            <div class="form-group">
                <label for="{{ form.amount.id_for_label }}">{{ form.amount.label }} {% if form.amount.field.required %}*{% endif %}</label>
                {{ form.amount }}
                {{ form.amount.errors }}
            </div>

            <button type="submit" id="submit-btn">Add Item</button>
        </form>

        <hr>
    
        <div class="stats" style="margin-top: 1rem; margin-bottom: 0;">
            Today's total:<br>
            <strong id="totalHydration">0</strong><strong style="text-transform: uppercase"> ML</strong> / 2000 ML
        </div>
        <div class="stats" style="margin-top: 0.5rem; margin-bottom: 1rem;">
            Time since your last hydration:<br>
            <strong id="lastHydrationTime">--:--:--</strong>
            <div id="noticeMessage">Stay hydrated!</div>
        </div>

        <div id="waterTableWrapper">
            <table>
                <thead id="waterTable-head">
                    <tr>
                        <th>Time</th>
                        <th>Amount</th>
                        <th></th>
                    </tr>
                </thead>
            </table>
            <div id="waterTableScrollable">
                <table>            
                    <tbody id="waterTable-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ========= RIGHT PANEL ========= -->
    <div id="right-panel">
        interactive content
    </div>
</div>

<script>    
    // --- Timing last hydration ---
    let hydrationTimer = null;

    // --- Fetch and display today's entries ---
    async function loadEntries() {
        try {
            const response = await fetch('/api/water-list/get_today/');
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const tbody = document.getElementById('waterTable-body');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">No records</td></tr>';
                document.getElementById('totalHydration').textContent = '0';
                startHydrationTimer(null);
                return;
            }

            let totalmL = 0;

            let latestTimeStr = '00:00:00';
            
            data.forEach(entry => {
                const row = document.createElement('tr');
                const time = document.createElement('td');
                const amount = document.createElement('td');
                const delBtn = document.createElement('button');
                time.textContent = entry.time;
                amount.textContent = entry.amount;
                delBtn.setAttribute('class', 'delBtn');
                delBtn.textContent = '×';
                delBtn.addEventListener('click', async ()=>{
                    try {
                        const response = await fetch('/api/water-list/delete/', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ ref_token: entry.ref_token })
                        })
                        if (!response.ok) throw new Error('Delete failed');
                        loadEntries();
                    } catch (err) {
                        alert('Failed to delete: ' + err.message);
                        loadEntries()
                    }
                })
                row.append(time, amount, delBtn);
                tbody.appendChild(row);
                totalmL += parseInt(entry.amount) || 0;

                if (entry.time > latestTimeStr) latestTimeStr = entry.time;
            });

            if (tbody.children.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">No records for today</td></tr>';
            }

            document.getElementById('totalHydration').textContent = totalmL;
            startHydrationTimer(latestTimeStr);
        } catch (err) {
            console.error('Failed to load water entries:', err);
            document.getElementById('waterTable-body').innerHTML = '<tr><td colspan="3">Failed to load</td></tr>';
        }
    }

    function startHydrationTimer(latestTimeStr) {
        // Clear any previous interval
        if (hydrationTimer) {
            clearInterval(hydrationTimer);
            hydrationTimer = null;
        }

        const now = new Date();
        let lastHydrationDate = null;

        if (latestTimeStr) {
            // Parse the HH:MM:SS time as if it happened today
            const [h, m, s] = latestTimeStr.split(':').map(Number);
            lastHydrationDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, s);
        } else {
            // No entries today – start from the beginning of the day (midnight)
            lastHydrationDate = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
        }

        // Update immediately and then every second
        function updateDisplay() {
            const elapsed = Math.floor((new Date() - lastHydrationDate) / 1000); // seconds
            const hours = Math.floor(elapsed / 3600);
            const minutes = Math.floor((elapsed % 3600) / 60);
            const display = `${String(hours)}h : ${String(minutes)}min`;
            document.getElementById('lastHydrationTime').textContent = display;

            const noticeEl = document.getElementById('noticeMessage');
            if (elapsed > 3600*4) noticeEl.textContent = 'You are not a cactus, go get some water!'
            else if (elapsed > 3600) noticeEl.textContent = 'Take a break, its time to drink some water.';
            else noticeEl.textContent = 'Doing great! Stay hydrated.';
        }

        updateDisplay();
        hydrationTimer = setInterval(updateDisplay, 1000);
    }

    // --- Compress past entries ---
    async function compressPastEntries() {
        const identifier = '[PAST RECORD]'
        try {
            const response = await fetch('/api/water-list/get_full/');
            if (!response.ok) throw new Error(`HTTP${response.status}`);
            const data = await response.json();
            if (data.length === 0) return;

            const TODAY = new Date().toLocaleDateString('en-CA'); 
            const pastDays = {}; 
            data.forEach(entry => {
                if (entry.date !== TODAY && !entry.name.startsWith(identifier)) {
                    if (!pastDays[entry.date]) pastDays[entry.date] = { tokens: [], totalAmount: 0, lastHydrationTime: entry.time};

                    pastDays[entry.date].tokens.push(entry.ref_token);   // ← ref_token
                    pastDays[entry.date].totalAmount += parseInt(entry.amount) || 0;
                    
                    if (pastDays[entry.date].lastHydrationTime > entry.time) pastDays[entry.date].lastHydrationTime = entry.time;
                }
            });

            for (const date in pastDays) {
                const thatDay = pastDays[date];
                for (const token of thatDay.tokens) {
                    await fetch('/api/water-list/delete/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ref_token: token })    // ← ref_token
                    });
                }
            }

            for (const date in pastDays) {
                await fetch('/api/water-list/create/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: `${identifier} ${date}`,
                        amount: pastDays[date].totalAmount,
                        time: pastDays[date].lastHydrationTime,
                        date: date
                    })
                });
            }
            loadEntries();
        } 
        catch(err) {
            console.error('Failed to compress entries before today:', err);
        }
    }
    
    document.addEventListener('DOMContentLoaded', async ()=>{
        await compressPastEntries();
        loadEntries()
    });
</script>
